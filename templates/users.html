{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">User Management</h2>

<table class="table table-striped">
  <thead class="table-dark"><tr><th>ID</th><th>Username</th><th>Role</th></tr></thead>
  <tbody>
    {% for u in users %}
      <tr><td>{{ u[0] }}</td><td>{{ u[1] }}</td><td>{{ u[2] }}</td></tr>
    {% endfor %}
  </tbody>
</table>

<h4 class="mt-4">Create Staff/Admin</h4>
<form action="{{ url_for('register_staff') }}" method="post" class="row g-2">
  <div class="col-md-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
  <div class="col-md-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
  <div class="col-md-3">
    <select name="role" class="form-select">
      <option value="Staff">Staff</option>
      <option value="Admin">Admin</option>
    </select>
  </div>
  <div class="col-md-3"><button class="btn btn-success w-100">Create</button></div>
</form>
{% endblock %}
